# vgi-lint-check configuration for vgi-tlsfp.
#
# Every function this worker exposes is a pure, deterministic compute scalar over
# raw handshake bytes or already-extracted fields (no network, no backend, no
# external state), so the linter's execution rules (VGI9xx) CAN run the example
# queries locally against the attached worker. We keep execution ENABLED and gate
# the whole suite — static metadata and executable examples alike — at `info`.
#
# The catalog `source_url` (→ the GitHub repo), per-object tags, titles,
# doc_llm/doc_md, per-arg docs, and example queries are emitted from the worker's
# FunctionMetadata (see crates/tlsfp-worker/src/**), which the linter reads over
# VGI.
[tool.vgi-lint-check]
select = ["ALL"]
ignore = []
fail_on = "info"

[tool.vgi-lint-check.options]
column_comment_min_ratio = 0.8
